<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wajdan Quran Certificate Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a0e2e;
            font-family: Georgia, serif;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        .app {
            max-width: 1050px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: #e8c97a;
        }

        header p {
            color: #a08cb0;
            font-size: 0.9rem;
            margin-top: 0.3rem;
        }

        .controls {
            background: #261540;
            border: 1px solid #3d2860;
            border-radius: 1.2rem;
            padding: 1.5rem 1.8rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
        }

        .ctrl-group {
            flex: 1 1 160px;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .ctrl-group label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #c4a5e0;
        }

        .ctrl-group input {
            background: #1a0e2e;
            border: 1.5px solid #5a3d80;
            border-radius: 8px;
            padding: 0.65rem 0.9rem;
            color: #f0e8ff;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .ctrl-group input:focus {
            border-color: #e8c97a;
            box-shadow: 0 0 0 3px rgba(232, 201, 122, 0.15);
        }

        .upload-btn {
            background: #3d2260;
            border: 1.5px dashed #e8c97a;
            border-radius: 8px;
            padding: 0.65rem 1rem;
            color: #e8c97a;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            transition: background 0.2s;
        }

        .upload-btn:hover {
            background: #4d2e78;
        }

        .upload-btn input {
            display: none;
        }

        .hint {
            color: #7a6090;
            font-size: 0.78rem;
            margin-top: 0.3rem;
        }

        .action-row {
            width: 100%;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            border-top: 1px solid #3d2860;
            padding-top: 1rem;
            margin-top: 0.2rem;
        }

        .btn {
            padding: 0.7rem 1.8rem;
            border-radius: 50px;
            border: none;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #b8922a, #e8c97a);
            color: #1a0e2e;
        }

        .btn-primary:hover {
            filter: brightness(1.1);
            transform: scale(1.02);
        }

        .btn-secondary {
            background: #a11e5e;
            color: white;
            border: 1px solid #c03070;
        }

        .btn-secondary:hover {
            filter: brightness(1.15);
            transform: scale(1.02);
        }

        .fine-tune {
            background: #1e1030;
            border: 1px solid #3d2860;
            border-radius: 1rem;
            padding: 1.2rem 1.8rem;
            margin-bottom: 1.5rem;
        }

        .fine-tune h3 {
            color: #e8c97a;
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.9rem;
        }

        .sliders {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem 2rem;
        }

        .slider-row {
            flex: 1 1 180px;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .slider-row label {
            font-size: 0.75rem;
            color: #c4a5e0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
        }

        .slider-row input[type=range] {
            width: 100%;
            accent-color: #e8c97a;
        }

        .preview-container {
            border-radius: 1rem;
            overflow: hidden;
            border: 2px solid #3d2860;
            background: #111;
        }

        /* Preview canvas fills the container width */
        #previewCanvas {
            display: block;
            width: 100%;
            height: auto;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }
    </style>
</head>

<body>
    <div class="app">
        <header>
            <h1>🕌 Wajdan Quran Academy — Certificate Generator</h1>
            <p>Upload certificate background · adjust sliders · download pixel-perfect PNG</p>
        </header>

        <div class="controls">
            <div class="ctrl-group" style="flex:0 0 auto;">
                <label>Certificate Image</label>
                <label class="upload-btn">
                    📂 Upload PNG / JPG
                    <input type="file" id="imgUpload" accept="image/png,image/jpeg,image/jpg">
                </label>
                <span id="fileName" class="hint">no file chosen</span>
            </div>
            <div class="ctrl-group">
                <label>👤 Student Name</label>
                <input type="text" id="inName" value="Aisha Khan" placeholder="Full name">
            </div>
            <div class="ctrl-group" style="flex:0 0 130px;">
                <label>📖 Para Number</label>
                <input type="text" id="inPara" value="30" placeholder="e.g. 30">
            </div>
            <div class="ctrl-group">
                <label>📅 Completion Date</label>
                <input type="text" id="inDate" value="March 13, 2026" placeholder="March 13, 2026">
            </div>
            <div class="action-row">
                <button class="btn btn-primary" id="btnUpdate">⟳ Update Preview</button>
                <button class="btn btn-secondary" id="btnDownload">⬇ Download Certificate</button>
            </div>
        </div>

        <div class="fine-tune">
            <h3>🎯 Fine-tune positions — adjust until text sits perfectly on certificate</h3>
            <div class="sliders">
                <div class="slider-row">
                    <label>Name — Top <span id="lbNameTop">450</span>px</label>
                    <input type="range" id="sNameTop" min="300" max="650" value="450">
                </div>
                <div class="slider-row">
                    <label>Name — Left <span id="lbNameLeft">590</span>px</label>
                    <input type="range" id="sNameLeft" min="300" max="1100" value="590">
                </div>
                <div class="slider-row">
                    <label>Para # — Top <span id="lbParaTop">610</span>px</label>
                    <input type="range" id="sParaTop" min="450" max="800" value="610">
                </div>
                <div class="slider-row">
                    <label>Para # — Left <span id="lbParaLeft">890</span>px</label>
                    <input type="range" id="sParaLeft" min="500" max="1200" value="890">
                </div>
                <div class="slider-row">
                    <label>Date — Top <span id="lbDateTop">758</span>px</label>
                    <input type="range" id="sDateTop" min="600" max="950" value="758">
                </div>
                <div class="slider-row">
                    <label>Date — Left <span id="lbDateLeft">812</span>px</label>
                    <input type="range" id="sDateLeft" min="500" max="1100" value="812">
                </div>
            </div>
        </div>

        <div class="preview-container">
            <!-- Everything renders onto this canvas — preview IS the output, just scaled down by CSS -->
            <canvas id="previewCanvas" width="1600" height="1130"></canvas>
        </div>
    </div>

    <script>
        (function () {
            const W = 1600, H = 1130;

            const canvas = document.getElementById('previewCanvas');
            const ctx = canvas.getContext('2d');
            const imgUpload = document.getElementById('imgUpload');
            const fileName = document.getElementById('fileName');
            const inName = document.getElementById('inName');
            const inPara = document.getElementById('inPara');
            const inDate = document.getElementById('inDate');
            const btnUpdate = document.getElementById('btnUpdate');
            const btnDownload = document.getElementById('btnDownload');

            let bgImage = null; // loaded Image object

            // Slider config
            const sliders = [
                { id: 'sNameTop', lb: 'lbNameTop' },
                { id: 'sNameLeft', lb: 'lbNameLeft' },
                { id: 'sParaTop', lb: 'lbParaTop' },
                { id: 'sParaLeft', lb: 'lbParaLeft' },
                { id: 'sDateTop', lb: 'lbDateTop' },
                { id: 'sDateLeft', lb: 'lbDateLeft' },
            ].map(cfg => ({
                el: document.getElementById(cfg.id),
                lb: document.getElementById(cfg.lb)
            }));

            function sVal(id) { return parseInt(document.getElementById(id).value); }

            function render() {
                ctx.clearRect(0, 0, W, H);

                // Background
                if (bgImage) {
                    ctx.drawImage(bgImage, 0, 0, W, H);
                } else {
                    ctx.fillStyle = '#f3e5ca';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = '#987654';
                    ctx.font = '30px Georgia';
                    ctx.textAlign = 'center';
                    ctx.fillText('Upload your certificate background', W / 2, 120);
                    ctx.textAlign = 'left';
                }

                const name = inName.value.trim() || '______';
                const para = inPara.value.trim() || '___';
                const date = inDate.value.trim() || '______';

                // ── Name ──
                ctx.font = '78px "Brush Script MT", "Segoe Script", cursive';
                ctx.fillStyle = '#1a1a1a';
                ctx.textBaseline = 'top';
                ctx.fillText(name, sVal('sNameLeft'), sVal('sNameTop'));

                // ── Para number ──
                ctx.font = 'bold 34px Georgia, "Times New Roman", serif';
                ctx.fillStyle = '#1a1a1a';
                ctx.fillText(para, sVal('sParaLeft'), sVal('sParaTop'));

                // ── Date ──
                ctx.font = '32px Georgia, "Times New Roman", serif';
                ctx.fillStyle = '#2a1a0a';
                ctx.fillText(date, sVal('sDateLeft'), sVal('sDateTop'));
            }

            // Slider live update
            sliders.forEach(({ el, lb }) => {
                el.addEventListener('input', () => { lb.textContent = el.value; render(); });
            });

            // Text input live update
            [inName, inPara, inDate].forEach(inp => {
                inp.addEventListener('input', render);
                inp.addEventListener('keypress', e => { if (e.key === 'Enter') render(); });
            });

            btnUpdate.addEventListener('click', render);

            // Image upload
            imgUpload.addEventListener('change', function () {
                const file = this.files[0];
                if (!file) return;
                fileName.textContent = file.name;
                const reader = new FileReader();
                reader.onload = ev => {
                    const img = new Image();
                    img.onload = () => { bgImage = img; render(); };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            });

            // Download — the canvas IS the output at full 1600×1130 resolution
            btnDownload.addEventListener('click', () => {
                render(); // ensure latest state
                const safeName = (inName.value.trim() || 'recipient').replace(/[^a-z0-9]/gi, '_').substring(0, 30);
                const link = document.createElement('a');
                link.download = `wajdan_cert_${safeName}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });

            // Init
            render();
        })();
    </script>
</body>

</html>
